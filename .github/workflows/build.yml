name: Build Oback (roothide)

# 在 GitHub macOS runner 上：用标准 theos 编出 rootless .deb，
# 再用 roothide 官方 RootHidePatcher 的 patch.sh 转成 roothide .deb。
# 说明：roothide 没有内置 theos package scheme（标准 theos 与 roothide/theos 都不带），
# 官方推荐流程就是 rootless 构建 + patch.sh 转换。
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null || true

      - name: Install dependencies
        run: |
          brew install dpkg ldid gnu-sed findutils coreutils xz
          cpanm -n IO::Compress::Lzma 2>/dev/null || true

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          for f in logos.pl dm.pl; do
            [ -e "$THEOS/bin/$f" ] && continue
            case "$f" in
              logos.pl) curl -fsSL https://raw.githubusercontent.com/theos/logos/master/logos.pl -o "$THEOS/bin/logos.pl" ;;
              dm.pl)    curl -fsSL https://raw.githubusercontent.com/theos/dm.pl/master/dm.pl -o "$THEOS/bin/dm.pl" ;;
            esac
            chmod +x "$THEOS/bin/$f"
          done

      - name: Install SDKs
        run: |
          rm -rf "$THEOS/sdks"
          git clone --depth=1 https://github.com/theos/sdks.git "$THEOS/sdks"
          ls -1 "$THEOS/sdks/" | grep -i iphone

      - name: Build rootless .deb
        run: |
          set -o pipefail
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1 | tee ci-build.log
          ROOTLESS_DEB=$(ls packages/*_iphoneos-arm64.deb 2>/dev/null | head -n1)
          echo "ROOTLESS_DEB=$ROOTLESS_DEB"
          [ -n "$ROOTLESS_DEB" ] || { echo "No rootless .deb produced"; exit 1; }

      - name: Surface build log as annotations
        if: always()
        run: |
          if [ -f ci-build.log ]; then
            # 逐行输出为 annotation，确保真实报错可被匿名 API 读取（不再依赖关键词匹配）
            sed 's/\r//' ci-build.log | tail -150 | while IFS= read -r line; do
              safe=$(printf '%s' "$line" | sed 's/::/:/g' | cut -c1-500)
              [ -n "$safe" ] && echo "::error::$safe"
            done
          else
            echo "::error::ci-build.log was not created (build aborted before 'make package')"
          fi

      - name: Convert to roothide (.deb) via RootHidePatcher/patch.sh
        if: success()
        run: |
          set -o pipefail
          curl -fsSL https://raw.githubusercontent.com/roothide/RootHidePatcher/master/patch.sh -o /tmp/patch.sh
          curl -fsSL https://raw.githubusercontent.com/roothide/RootHidePatcher/master/roothide.entitlements -o /tmp/roothide.entitlements
          chmod +x /tmp/patch.sh
          ROOTLESS_DEB=$(ls packages/*_iphoneos-arm64.deb | head -n1)
          sudo env "PATH=$PATH" bash /tmp/patch.sh "$ROOTLESS_DEB" packages/oback_roothide.deb 2>&1 | tee ci-patch.log
          echo "=== produced roothide deb ==="
          ls -la packages/oback_roothide.deb
          dpkg-deb -I packages/oback_roothide.deb | head -20

      - name: Surface patch errors as annotations
        if: always()
        run: |
          if [ -f ci-patch.log ]; then
            grep -nE "error|fatal|No such file|not found|denied|Stop" ci-patch.log \
              | sed 's/\r//' | head -40 \
              | while IFS= read -r line; do
                  safe=$(printf '%s' "$line" | sed 's/::/:/g')
                  echo "::error::$safe"
                done
          fi

      - name: Upload roothide .deb
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: oback-deb
          path: packages/oback_roothide.deb
          if-no-files-found: error
          retention-days: 90
