name: Build Oback (roothide)

# 推送或手动触发时，在 GitHub 的 macOS runner 上用 Theos 编译 roothide 版 .deb
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      # roothide 打包方案（Makefile 里也已写死，这里再保险设一次）
      THEOS_PACKAGE_SCHEME: roothide
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 由社区维护的 theos CI Action 负责安装 theos + iOS SDK + dpkg/ldid 等工具链
      - name: Build package with Theos
        uses: xzr46770661/action-build-theos@main

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: oback-deb
          path: packages/*.deb
          if-no-files-found: error
