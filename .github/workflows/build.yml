name: Build Oback (roothide)

# 在 GitHub macOS runner 上用 roothide 官方 theos 分支直接构建 roothide .deb：
#   1) clone roothide/theos（内置 roothide package scheme）
#   2) make package 直接产出 iphoneos-arm64e 的 roothide .deb（无需 patch.sh）
# 参考 RunningDotIndicator 的验证配置：动态探测 theos/sdks 中的最新 iPhoneOS SDK，
# 用 sed 改写 Makefile 的 TARGET，避免硬编码 SDK 版本缺失导致构建失败。
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null || true

      - name: Install dependencies
        run: |
          brew install dpkg ldid gnu-sed findutils coreutils xz
          cpanm -n IO::Compress::Lzma 2>/dev/null || true

      - name: Install Theos (roothide fork)
        run: |
          git clone --recursive https://github.com/roothide/theos.git "$THEOS"
          for f in logos.pl dm.pl; do
            [ -e "$THEOS/bin/$f" ] && continue
            case "$f" in
              logos.pl) curl -fsSL https://raw.githubusercontent.com/theos/logos/master/logos.pl -o "$THEOS/bin/logos.pl" ;;
              dm.pl)    curl -fsSL https://raw.githubusercontent.com/theos/dm.pl/master/dm.pl -o "$THEOS/bin/dm.pl" ;;
            esac
            chmod +x "$THEOS/bin/$f"
          done

      - name: Install SDKs
        run: |
          rm -rf "$THEOS/sdks"
          git clone --depth=1 https://github.com/theos/sdks.git "$THEOS/sdks"
          ls -1 "$THEOS/sdks/" | grep -i iphone

      - name: Detect SDK version
        id: sdk
        run: |
          SDK=$(ls "$THEOS/sdks/" | grep -o 'iPhoneOS[0-9.]*\.sdk' | sed 's/iPhoneOS//;s/\.sdk//' | sort -V | tail -1)
          echo "sdk_version=$SDK" >> "$GITHUB_OUTPUT"
          echo "Detected latest SDK: $SDK"
          sed -i '' "s/TARGET := iphone:clang:.*/TARGET := iphone:clang:$SDK:15.0/" Makefile
          echo "Makefile TARGET now:"
          grep '^TARGET' Makefile

      - name: Build roothide .deb
        run: |
          set -o pipefail
          make clean
          make package FINALPACKAGE=1 THEOS_ENV=silent 2>&1 | tee ci-build.log || make package FINALPACKAGE=1 2>&1 | tee ci-build.log
          ROOTHIDE_DEB=$(ls packages/*_iphoneos-arm64e.deb 2>/dev/null | head -n1)
          echo "ROOTHIDE_DEB=$ROOTHIDE_DEB"
          [ -n "$ROOTHIDE_DEB" ] || { echo "No roothide .deb produced"; exit 1; }
          ls -la "$ROOTHIDE_DEB"
          dpkg-deb -I "$ROOTHIDE_DEB" | head -20

      - name: Surface build error to commit comment
        if: failure()
        run: |
          ERR=$(grep -iE "error:|undeclared identifier|No such file|use of undeclared" ci-build.log | head -40 || true)
          if [ -z "$ERR" ]; then ERR=$(tail -40 ci-build.log); fi
          BODY=$(printf 'CI build failed. Relevant errors:\n```\n%s\n```' "$ERR")
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments"

      - name: Upload roothide .deb
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: oback-deb
          path: packages/*_iphoneos-arm64e.deb
          if-no-files-found: error
          retention-days: 90
